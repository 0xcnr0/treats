<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-user-select: none; user-select: none;
        cursor: default;
      }
      /* whole window is draggable, except the pet itself */
      body { -webkit-app-region: drag; }

      #stage {
        position: relative; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        padding-bottom: 6px; box-sizing: border-box;
      }

      #petWrap {
        -webkit-app-region: no-drag; cursor: grab;
        position: relative; width: 96px; height: 96px;
        display: flex; align-items: center; justify-content: center;
      }
      #pet {
        font-size: 64px; line-height: 1;
        transition: transform 0.08s ease;
        animation: bob 2.4s ease-in-out infinite;
        will-change: transform;
        filter: drop-shadow(0 6px 6px rgba(0,0,0,0.35));
      }
      @keyframes bob {
        0%,100% { transform: translateY(0) }
        50% { transform: translateY(-6px) }
      }
      #petWrap.happy #pet { animation: hop 0.5s ease; }
      @keyframes hop {
        0% { transform: translateY(0) scale(1) }
        30% { transform: translateY(-22px) scale(1.12, 0.9) }
        60% { transform: translateY(0) scale(0.95, 1.08) }
        100% { transform: translateY(0) scale(1) }
      }
      #petWrap.sad #pet { animation: shake 0.45s ease; }
      @keyframes shake {
        0%,100% { transform: translateX(0) rotate(0) }
        20% { transform: translateX(-7px) rotate(-7deg) }
        40% { transform: translateX(6px) rotate(6deg) }
        60% { transform: translateX(-5px) rotate(-5deg) }
        80% { transform: translateX(4px) rotate(4deg) }
      }

      #mood {
        position: absolute; top: -4px; right: -2px; font-size: 20px;
        opacity: 0; transition: opacity 0.3s;
      }
      #petWrap.show-mood #mood { opacity: 1; }

      #label {
        -webkit-app-region: no-drag;
        margin-top: 2px; font-size: 12px; font-weight: 700;
        color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        background: rgba(20,22,34,0.55); padding: 2px 9px; border-radius: 999px;
        backdrop-filter: blur(4px); white-space: nowrap;
      }
      #label .rank { font-weight: 500; opacity: 0.8; font-size: 10px; }

      #redflash {
        position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(circle at 50% 45%, rgba(255,40,40,0) 30%, rgba(200,0,0,0.45) 100%);
        opacity: 0; transition: opacity 0.1s;
      }
      #redflash.on { opacity: 1; }

      .particle {
        position: absolute; pointer-events: none; font-size: 18px;
        will-change: transform, opacity;
      }
      #hint {
        -webkit-app-region: no-drag; position: absolute; top: 4px; left: 0; right: 0;
        text-align: center; font-size: 9px; color: #cfd3e6; opacity: 0;
        transition: opacity 0.25s; text-shadow: 0 1px 2px #000;
      }
      #stage:hover #hint { opacity: 0.7; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="redflash"></div>
      <div id="hint">click = treat · right-click = scold · drag to move</div>
      <div id="petWrap">
        <span id="mood">✨</span>
        <span id="pet">🐶</span>
      </div>
      <div id="label"><span id="treats">0 🦴</span> <span class="rank" id="rank">Good Pup</span></div>
    </div>
    <script src="pet.js"></script>
  </body>
</html>
