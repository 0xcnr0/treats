name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Syntax check core
        run: |
          for f in packages/core/src/*.js packages/core/bin/*.js scripts/*.js; do
            node --check "$f"
          done
      - name: Run unit tests
        run: npm test
      - name: Generate assets (sounds + icons)
        run: npm run gen-assets
      - name: Smoke-test the CLI feedback loop
        run: |
          node packages/core/bin/treats.js reset --yes
          node packages/core/bin/treats.js good ci test
          node packages/core/bin/treats.js bad ci test
          node packages/core/bin/treats.js undo
          node packages/core/bin/treats.js status --json
          echo '{"hook_event_name":"SessionStart"}' | node packages/core/bin/treats.js hook session-start
          node packages/core/bin/treats.js reset --yes
